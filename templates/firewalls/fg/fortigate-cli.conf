# FORTIGATE EXTERNAL FEED TEMPLATE
# Review on the exact FortiOS release before applying.
# Domain feeds require a category value. 192 and 193 are placeholders from the valid 192-221 range;
# change them if those categories are already used in your environment.

config system external-resource
    edit "{{OBJECT_PREFIX}}_IP"
        set status enable
        set type address
        set update-method feed
        set resource "{{IP_URL}}"
        set refresh-rate {{INTERVAL_MIN}}
        set server-identity-check full
        set comments "USOM IPv4 and IPv6 threat feed"
    next
    edit "{{OBJECT_PREFIX}}_DOMAIN"
        set status enable
        set type domain
        set update-method feed
        set category 192
        set resource "{{DOMAIN_URL}}"
        set refresh-rate {{INTERVAL_MIN}}
        set server-identity-check full
        set comments "USOM domain threat feed"
    next
end

# URL output is published for environments that map it through a compatible web-filter workflow.
# It is intentionally not applied automatically by this generic template:
# {{URL_URL}}

# After review:
# 1. Run: show system external-resource
# 2. Verify connector status and entries in Security Fabric > External Connectors.
# 3. Reference the created objects in a narrowly scoped policy/profile.
